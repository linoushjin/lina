<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cottage Leaf Goal</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="widget">

    <!-- particles -->

    <div id="leaf-layer"></div>

    <div id="sparkle-layer"></div>

    <!-- title -->

    <div id="header">

        <h1>Jinggg Mouse Fund</h1>

        <p>Every leaf brings me closer 🌿</p>

    </div>

    <!-- progress -->

    <div id="goal-track">

        <div id="goal-fill"></div>

        <img id="frog">

    </div>

    <!-- counter -->

    <div id="counter">

        <span id="current-value">€0</span>

        <span>/</span>

        <span id="target-value">€200</span>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
